<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikret Aras Bulut | Profesyonel Ders Paneli</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:#fff;padding:20px;min-height:100vh}.wrap{max-width:980px;margin:auto}.hero{padding:24px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.card{background:rgba(255,255,255,.08);padding:18px;border-radius:22px;backdrop-filter:blur(8px)}h1{margin:0 0 8px;font-size:32px}.muted{color:#d1d5db}.big{font-size:28px;font-weight:700}input,button{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px}input{background:#e5e7eb;color:#000}button{background:#22d3ee;font-weight:700;cursor:pointer;color:#0f172a}.tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#334155;margin-top:8px}.daily-list{margin-top:10px;padding:0;list-style:none}.daily-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);font-size:14px}.active-lesson{background:rgba(34,211,238,0.2);border-radius:10px;color:#22d3ee;font-weight:bold}.search-res{background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;margin-top:5px;font-size:14px;border-left:4px solid #22d3ee}.q-res-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;font-size:15px}@media(max-width:600px){h1{font-size:24px}.big{font-size:22px}}

/* Kazanım Slider Stilleri */
.kazanim-container{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}.nav-btn{width:40px!important;margin:0!important;background:#334155!important;color:#fff!important;flex-shrink:0}.kazanim-content{text-align:center;width:100%}.week-title{color:#22d3ee;font-weight:700;margin-bottom:5px;display:block}.kazanim-text{font-size:15px;line-height:1.5;display:block;min-height:60px}
</style>
</head>
<body>
<div class='wrap'>
    <div class='hero'>
        <h1>Fikret Aras Bulut | Ders Takip Paneli</h1>
        <div class='muted'>Fizik Öğretmeni Profesyonel Asistanı</div>
        <div class='tag'>V5.0 • Günlük Plan Sorgulama • Akıllı Takip</div>
    </div>
    
    <div class='card' style='margin-bottom:18px; border: 1px solid rgba(255,255,255,0.1)'>
        <h2 style='margin-top:0; font-size:20px; color:#22d3ee'>📖 Haftalık Kazanım Takibi</h2>
        <div class="kazanim-container">
            <button class="nav-btn" onclick="changeWeek(-1)">❮</button>
            <div class="kazanim-content">
                <span id="currentWeekRange" class="week-title">Yükleniyor...</span>
                <span id="currentKazanim" class="kazanim-text">...</span>
            </div>
            <button class="nav-btn" onclick="changeWeek(1)">❯</button>
        </div>
    </div>

    <div class='grid'>
        <div class='card'><div class='muted'>Tarih / Saat</div><div id='now' class='big'></div></div>
        <div class='card'><div class='muted'>Şu An</div><div id='lesson' class='big'>Yükleniyor...</div></div>
        <div class='card'><div class='muted'>Durum</div><div id='next' class='big'>-</div></div>
    </div>

    <div class='card' style='margin-top:18px'>
        <h2 style='margin-top:0; font-size:20px; color:#22d3ee'>📅 Bugünün Program Akışı</h2>
        <div id='dailySchedule' class='daily-list'></div>
    </div>

    <div class='card' style='margin-top:18px; border: 1px solid rgba(34,211,238,0.3)'>
        <h2 style='margin-top:0; font-size:20px'>🔍 Sınıf Ders Programı Bul</h2>
        <input type='text' id='classInput' placeholder='Örn: 11D, 11/B, 11-A...'>
        <button onclick='queryByClass()'>Hangi Gün Dersim Var?</button>
        <div id='classResult' style='margin-top:14px;'></div>
    </div>

    <div class='card' style='margin-top:18px; background: rgba(34,211,238,0.1)'>
        <h2 style='margin-top:0; font-size:20px'>🕒 Tarihe Göre Program Sorgula</h2>
        <input type='date' id='dateQuery'>
        <button onclick='queryDayProgram()'>O Günün Programını Göster</button>
        <div id='dayResult' style='margin-top:14px;'></div>
    </div>
</div>

<script>
// Kazanım Verileri (Excel'den aktarıldı)
const yillikPlan = [
    {h: "8-12 Eylül", k: "11.1.1.1. Vektörlerin özelliklerini açıklar.\n11.1.1.2. İki ve üç boyutlu kartezyen koordinat sisteminde vektörleri çizer."},
    {h: "15-19 Eylül", k: "11.1.1.3. Vektörlerin bileşkelerini farklı yöntemleri kullanarak hesaplar."},
    {h: "22-26 Eylül", k: "11.1.1.3. Vektörlerin bileşkelerini farklı yöntemleri kullanarak hesaplar."},
    {h: "29 Eylül - 3 Ekim", k: "11.1.2.1. Sabit ivmeli hareket ile ilgili kavramları açıklar.\n11.1.2.2. Net kuvvetin yönü ve büyüklüğünü belirleyerek ivmenin yönünü ve büyüklüğünü hesaplar."},
    {h: "6-10 Ekim", k: "11.1.3.1. Sabit ivmeli hareket yapan cisimlerin hareketlerini analiz eder."},
    {h: "13-17 Ekim", k: "11.1.3.1. Sabit ivmeli hareket yapan cisimlerin hareketlerini analiz eder."},
    {h: "20-24 Ekim", k: "11.1.3.2. Hava direncinin ihmal edildiği ortamda düşey doğrultuda serbest düşüş, aşağıdan yukarıya ve yukarıdan aşağıya atış hareketlerini analiz eder."},
    {h: "27-31 Ekim", k: "11.1.3.3. Hava direncinin ihmal edildiği ortamda iki boyutta atış hareketlerini analiz eder."},
    {h: "3-7 Kasım", k: "11.1.3.3. Hava direncinin ihmal edildiği ortamda iki boyutta atış hareketlerini analiz eder."},
    {h: "10-14 Kasım", k: "ARA TATİL"},
    {h: "17-21 Kasım", k: "11.1.3.4. Limit hız kavramını açıklar."},
    {h: "24-28 Kasım", k: "11.1.4.1. Enerji korunumunu kullanarak cisimlerin hareketlerini analiz eder."},
    {h: "1-5 Aralık", k: "11.1.4.1. Enerji korunumunu kullanarak cisimlerin hareketlerini analiz eder."},
    {h: "8-12 Aralık", k: "11.1.5.1. İtme ve çizgisel momentum kavramlarını açıklar.\n11.1.5.2. İtme ile çizgisel momentum değişimi arasında ilişki kurar."},
    {h: "15-19 Aralık", k: "11.1.5.3. Çizgisel momentumun korunumunu analiz eder."},
    {h: "22-26 Aralık", k: "11.1.5.4. Çizgisel momentumun korunumu ile ilgili hesaplamalar yapar."},
    {h: "29 Aralık - 2 Ocak", k: "11.1.6.1. Tork kavramını açıklar.\n11.1.6.2. Torkun bağlı olduğu değişkenleri analiz eder."},
    {h: "5-9 Ocak", k: "11.1.6.3. Tork ile ilgili matematiksel hesaplamalar yapar.\n11.1.7.1. Cisimlerin denge şartlarını açıklar."},
    {h: "12-16 Ocak", k: "11.1.7.2. Kütle merkezi ve ağırlık merkezi ile ilgili işlemler yapar."},
    {h: "19-23 Ocak", k: "1. DÖNEM SONU / SINAV HAFTASI"},
    {h: "2-6 Şubat", k: "11.1.8.1. Basit makinelerin çalışma ilkelerini açıklar.\n11.1.8.2. Basit makineler ile ilgili hesaplamalar yapar."},
    {h: "9-13 Şubat", k: "11.1.8.2. Basit makineler ile ilgili hesaplamalar yapar."},
    {h: "16-20 Şubat", k: "11.2.1.1. Noktasal yükler arasındaki elektriksel kuvveti açıklar.\n11.2.1.2. Noktasal yüklerin oluşturduğu elektriksel alanı açıklar."},
    {h: "23-27 Şubat", k: "11.2.1.3. Noktasal yüklerin oluşturduğu elektriksel potansiyel enerji ve potansiyeli açıklar."},
    {h: "2-6 Mart", k: "11.2.1.4. Düzgün bir elektriksel alan içinde yüklü parçacıkların hareketini analiz eder."},
    {h: "9-13 Mart", k: "11.2.2.1. Sığa (kapasite) kavramını açıklar.\n11.2.2.2. Yüklü levhaların sığasını bağlı olduğu değişkenlerle ilişkilendirir."},
    {h: "16-20 Mart", k: "11.2.2.3. Kondansatörlerin kullanım alanlarını açıklar."},
    {h: "23-27 Mart", k: "11.2.3.1. Üzerinden akım geçen düz bir telin oluşturduğu manyetik alanı analiz eder."},
    {h: "30 Mart - 3 Nisan", k: "11.2.3.2. Manyetik alan içindeki akım geçen tele etki eden kuvveti açıklar."},
    {h: "6-10 Nisan", k: "ARA TATİL"},
    {h: "13-17 Nisan", k: "11.2.4.1. Manyetik akı kavramını açıklar.\n11.2.4.2. İndüksiyon akımını oluşturan sebeplere ilişkin analiz yapar."},
    {h: "20-24 Nisan", k: "11.2.4.3. Öz-indüksiyon akımının oluşum sebebini açıklar."},
    {h: "27 Nisan - 1 Mayıs", k: "11.2.5.1. Alternatif akımı açıklar.\n11.2.5.2. Alternatif ve doğru akımı karşılaştırır."},
    {h: "4-8 Mayıs", k: "11.2.5.3. Alternatif ve doğru akım devrelerinde direncin, bobinin ve sığacın davranışını açıklar."},
    {h: "11-15 Mayıs", k: "11.2.5.4. İndüktans, kapasitans, rezonans ve empedans kavramlarını açıklar."},
    {h: "18-22 Mayıs", k: "11.2.6.1. Transformatörlerin çalışma prensibini açıklar.\n11.2.6.2. Transformatörlerin kullanım amaçlarını açıklar."},
    {h: "25-29 Mayıs", k: "GENEL TEKRAR"},
    {h: "1-5 Haziran", k: "SINAV HAFTASI"}
];

let activeWeekIndex = 0;

function initKazanim() {
    let bugun = new Date();
    // Basit bir hafta bulucu logic
    activeWeekIndex = 0; 
    // Örn: Nisan sonundaysak 33. haftaya yakın bir yere odaklar
    // Manuel kontrol için başlangıçta bugüne en yakın haftayı set edelim
    updateKazanimUI();
}

function updateKazanimUI() {
    const item = yillikPlan[activeWeekIndex];
    document.getElementById('currentWeekRange').textContent = item.h;
    document.getElementById('currentKazanim').textContent = item.k;
}

function changeWeek(dir) {
    activeWeekIndex += dir;
    if(activeWeekIndex < 0) activeWeekIndex = 0;
    if(activeWeekIndex >= yillikPlan.length) activeWeekIndex = yillikPlan.length - 1;
    updateKazanimUI();
}

const data={1:[['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/D'],['15:30','16:10','11/D']],2:[['10:30','11:10','11/C'],['11:20','12:00','11/C'],['13:00','13:40','11/C'],['13:50','14:30','11/C'],['14:40','15:20','11/B'],['15:30','16:10','11/B']],3:[['11:20','12:00','11/A'],['13:00','13:40','11/A'],['13:50','14:30','11/A'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],4:[['08:50','09:30','11/C'],['09:40','10:20','11/C'],['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],5:[]};
const gunler = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];

function toMin(s){let p=s.split(':');return +p[0]*60 + +p[1]}
function cleanClassName(name) { return name.toUpperCase().replace(/[^A-Z0-9]/g, "").trim(); }

function queryDayProgram() {
    let selectedDate = dateQuery.value;
    if(!selectedDate) { dayResult.innerHTML = "Lütfen bir tarih seçin."; return; }
    let dateObj = new Date(selectedDate);
    let dayIndex = dateObj.getDay();
    let dayName = gunler[dayIndex];
    let arr = data[dayIndex] || [];
    let html = `<div style="border-bottom: 2px solid #22d3ee; padding-bottom: 5px; margin-bottom: 10px;"><b>${selectedDate} - ${dayName} Programı</b></div>`;
    if(dayIndex === 0 || dayIndex === 6 || (dayIndex === 5 && arr.length === 0)) {
        html += "Bu tarihte planlanmış bir dersiniz bulunmuyor.";
    } else if (arr.length === 0) {
        html += "Bu gün için ders kaydı girilmemiş.";
    } else {
        arr.forEach(ders => {
            html += `<div class="q-res-item"><span>${ders[0]} - ${ders[1]}</span><span style="color:#22d3ee">${ders[2]} Fizik</span></div>`;
        });
    }
    dayResult.innerHTML = html;
}

function queryByClass() {
    let input = cleanClassName(classInput.value);
    if(!input) { classResult.innerHTML = "Lütfen bir sınıf girin."; return; }
    let found = [];
    for(let gun in data) {
        data[gun].forEach(ders => {
            if(cleanClassName(ders[2]) === input) {
                found.push({gun: gunler[gun], saat: ders[0] + "-" + ders[1]});
            }
        });
    }
    if(found.length > 0) {
        let html = `<b>${classInput.value.toUpperCase()} Programı:</b><br>`;
        found.forEach(f => { html += `<div class="search-res">${f.gun} | ${f.saat}</div>`; });
        classResult.innerHTML = html;
    } else { classResult.innerHTML = "Ders bulunamadı."; }
}

function update(){
    let d=new Date(), day=d.getDay(), min=d.getHours()*60+d.getMinutes();
    now.textContent=d.toLocaleString('tr-TR');
    if(day===0||day===6||(day===5 && data[5].length===0)){
        lesson.textContent='Tatil'; next.textContent='Dinlenme Günü';
        dailySchedule.innerHTML = 'Bugün ders yok.'; 
    } else {
        let arr=data[day], cur=null, nxt=null;
        let html = '';
        arr.forEach((item) => {
            let s = toMin(item[0]), e = toMin(item[1]);
            let isActive = (min >= s && min < e), isPast = (min >= e);
            html += `<div class="daily-item ${isActive ? 'active-lesson' : ''}" style="opacity: ${isPast ? '0.5' : '1'}">
                <span><b>${item[0]}-${item[1]}</b></span>
                <span>${item[2]} Fizik</span>
                <span>${isActive ? '● ŞU AN' : (isPast ? 'Bitti' : 'Bekliyor')}</span>
            </div>`;
        });
        dailySchedule.innerHTML = html;
        if (min < toMin(arr[0][0])) {
            lesson.textContent = 'Henüz Başlamadı'; next.textContent = 'İlk Ders: ' + arr[0][0];
        } else {
            for(let i=0; i<arr.length; i++){
                let start=toMin(arr[i][0]), end=toMin(arr[i][1]);
                if(min >= start && min < end){
                    cur = {name: arr[i][2], rem: end - min, type: 'ders'};
                    nxt = arr[i+1]; break;
                } else if(i < arr.length - 1){
                    let nextStart = toMin(arr[i+1][0]);
                    if(min >= end && min < nextStart){
                        cur = {rem: nextStart - min, type: 'break'};
                        nxt = arr[i+1]; break;
                    }
                }
            }
            if(cur){
                if(cur.type === 'ders'){
                    lesson.textContent = cur.name + ' Fizik'; next.textContent = 'Bitişe: ' + cur.rem + ' dk';
                } else {
                    lesson.textContent = cur.rem > 30 ? 'Öğle Arası 🍴' : 'Teneffüs ☕';
                    next.textContent = nxt[2] + ' (' + cur.rem + ' dk)';
                }
            } else { lesson.textContent = 'Dersler Bitti'; next.textContent = 'İyi akşamlar!'; }
        }
    }
}
setInterval(update, 1000); update();
initKazanim(); // Kazanım sliderını başlat
</script>
</body>
</html>
