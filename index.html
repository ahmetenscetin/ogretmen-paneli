<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikret Aras Bulut | Fizik Öğretmen Paneli</title>
<style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:#fff;padding:20px;min-height:100vh}
    .wrap{max-width:980px;margin:auto}
    .hero{padding:24px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{background:rgba(255,255,255,.08);padding:18px;border-radius:22px;backdrop-filter:blur(8px);position:relative}
    h1{margin:0 0 8px;font-size:32px;letter-spacing:-1px}
    .muted{color:#94a3b8}
    .big{font-size:28px;font-weight:700;color:#22d3ee}
    input,button{width:100%;padding:14px;border-radius:14px;border:none;margin-top:10px;font-size:16px}
    input{background:#f1f5f9;color:#0f172a}
    button{background:#22d3ee;font-weight:700;cursor:pointer;color:#0f172a;transition:0.3s}
    button:hover{background:#06b6d4}
    .tag{display:inline-block;padding:6px 12px;border-radius:999px;background:#334155;margin-top:8px;font-size:12px;font-weight:600}
    
    /* Kapı (Uygulama Giriş) Stilleri */
    .gate-container{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .gate-card{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);padding:15px;border-radius:18px;text-align:center;cursor:pointer;transition:0.3s}
    .gate-card:active{transform:scale(0.95)}
    .gate-icon{font-size:24px;margin-bottom:5px}
    .gate-title{font-size:14px;font-weight:700}

    /* Slider Stilleri */
    .slider-container{overflow:hidden;position:relative;margin-top:10px;padding:10px 0}
    .slider-track{display:flex;transition:transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);cursor:grab}
    .slide{min-width:100%;padding:5px;user-select:none}
    .kazanim-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:18px;min-height:160px;display:flex;flex-direction:column;justify-content:center}
    .week-label{font-size:12px;color:#22d3ee;font-weight:bold;margin-bottom:4px}
    .date-label{font-size:11px;opacity:0.5;margin-bottom:10px}
    .topic-label{font-size:14px;line-height:1.6;color:#e2e8f0}

    /* Liste Stilleri */
    .daily-list{margin-top:10px;padding:0;list-style:none}
    .daily-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid rgba(255,255,255,0.05)}
    .active-lesson{background:rgba(34,211,238,0.15);border-radius:12px;border-left:4px solid #22d3ee;font-weight:bold;color:#22d3ee}
    @media(max-width:600px){h1{font-size:24px}.big{font-size:22px}}
</style>
</head>
<body>
<div class='wrap'>
    <div class='hero'>
        <h1>Fikret Aras Bulut</h1>
        <div class='muted'>Fizik Öğretmeni Profesyonel Kokpit</div>
        <div class='tag'>V7.0 • MEB UYUMLU</div>
    </div>

    <div class="gate-container">
        <div class="gate-card" onclick="openApp('eokul')">
            <div class="gate-icon">🏫</div>
            <div class="gate-title">e-Okul Giriş</div>
        </div>
        <div class="gate-card" onclick="openApp('mebbis')">
            <div class="gate-icon">🔐</div>
            <div class="gate-title">MEBBİS Giriş</div>
        </div>
    </div>

    <div class='card' style='margin-bottom:18px'>
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h2 style='margin:0; font-size:18px'>📜 Haftalık Resmi Kazanımlar</h2>
            <div id="weekCounter" style="font-size:12px; color:#22d3ee"></div>
        </div>
        <div class='slider-container' id="sliderContainer">
            <div class='slider-track' id="sliderTrack"></div>
        </div>
        <div style="text-align:center; font-size:10px; opacity:0.4">← Müfredatta Gezinmek İçin Kaydırın →</div>
    </div>
    
    <div class='grid'>
        <div class='card'><div class='muted'>Tarih / Saat</div><div id='now' class='big'></div></div>
        <div class='card'><div class='muted'>Şu An</div><div id='lesson' class='big'>-</div></div>
        <div class='card'><div class='muted'>Kalan Süre</div><div id='next' class='big'>-</div></div>
    </div>

    <div class='card' style='margin-top:18px'>
        <h2 style='margin-top:0; font-size:20px; color:#22d3ee'>📅 Bugünün Akışı</h2>
        <div id='dailySchedule' class='daily-list'></div>
    </div>

    <div class='card' style='margin-top:18px; border: 1px solid rgba(34,211,238,0.2)'>
        <h2 style='margin:0 0 10px 0; font-size:18px'>🔍 Sınıf Sorgula</h2>
        <input type='text' id='classInput' placeholder='Örn: 11-D veya 11B'>
        <button onclick='queryByClass()'>Ders Saatlerini Gör</button>
        <div id='classResult' style='margin-top:15px; font-size:14px; line-height:1.6'></div>
    </div>
</div>

<script>
// YILLIK PLAN VERİLERİ (Dosyadan Aktarıldı)
const plan = [
    {s: '2025-09-08', e: '2025-09-14', t: '11.1.1.1. Vektörlerin özelliklerini açıklar. 11.1.1.2. İki ve üç boyutlu kartezyen koordinat sisteminde vektörleri çizer. 11.1.1.3. Vektörlerin bileşkelerini hesaplar.'},
    {s: '2025-09-15', e: '2025-09-21', t: '11.1.2.1. Sabit hızlı iki cismin hareketini birbirine göre yorumlar. 11.1.2.2. Hareketli bir ortamdaki sabit hızlı cisimlerin hareketini yorumlar.'},
    {s: '2025-09-22', e: '2025-09-28', t: '11.1.3.1. Net kuvvetin yönünü belirleyerek büyüklüğünü hesaplar. Net kuvvet etkisindeki cismin hareketini analiz eder.'},
    {s: '2025-11-24', e: '2025-11-30', t: '11.1.6.1. Yapılan iş ile enerji arasındaki ilişkiyi analiz eder. 11.1.6.2. Esneklik potansiyel enerjisini açıklar (Hooke Yasası).'},
    {s: '2026-04-13', e: '2026-04-19', t: '11.2.4.3. Üzerinden akım geçen iletken düz bir tele manyetik alanda etki eden kuvvetin yönünün ve şiddetinin bağlı olduğu değişkenleri analiz eder.'},
    {s: '2026-04-20', e: '2026-04-26', t: '11.2.4.5. Yüklü parçacıkların manyetik alan içindeki hareketini analiz eder. Sağ el kuralı kullanılarak yörüngeler çizilir.'},
    {s: '2026-04-27', e: '2026-05-03', t: '11.2.4.6. Manyetik akı kavramını açıklar. 11.2.4.7. İndüksiyon akımını oluşturan sebeplere ilişkin çıkarım yapar. 11.2.4.8. Öz-indüksiyon akımının oluşum sebebini açıklar.'},
    {s: '2026-06-22', e: '2026-06-28', t: '11.2.6.1. Transformatörlerin çalışma prensibini açıklar. 11.2.6.2. Transformatörlerin kullanım amaçlarını açıklar.'}
];

// HAFTALIK DERS PROGRAMI
const data={1:[['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/D'],['15:30','16:10','11/D']],2:[['10:30','11:10','11/C'],['11:20','12:00','11/C'],['13:00','13:40','11/C'],['13:50','14:30','11/C'],['14:40','15:20','11/B'],['15:30','16:10','11/B']],3:[['11:20','12:00','11/A'],['13:00','13:40','11/A'],['13:50','14:30','11/A'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],4:[['08:50','09:30','11/C'],['09:40','10:20','11/C'],['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],5:[]};
const gunler = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];

// UYGULAMA AÇMA FONKSİYONU
function openApp(appName) {
    let uri = appName === 'eokul' ? "intent://#Intent;scheme=com.meb.eokulkurum;package=com.meb.eokulkurum;end" : "intent://#Intent;scheme=tr.gov.meb.mebbis;package=tr.gov.meb.mebbis;end";
    let store = appName === 'eokul' ? "https://play.google.com/store/apps/details?id=com.meb.eokulkurum" : "https://play.google.com/store/apps/details?id=tr.gov.meb.mebbis";
    const start = Date.now();
    window.location.href = uri;
    setTimeout(() => { if (Date.now() - start < 2500) window.location.href = store; }, 2000);
}

// SLIDER SİSTEMİ
let currentSlide = 0;
const track = document.getElementById('sliderTrack');
function buildSlider() {
    let today = new Date(); let activeIdx = 0;
    plan.forEach((item, i) => {
        const slide = document.createElement('div'); slide.className = 'slide';
        let sD = new Date(item.s), eD = new Date(item.e);
        if (today >= sD && today <= eD) activeIdx = i;
        slide.innerHTML = `<div class="kazanim-box"><div class="week-label">PLANLANAN HAFTA: ${i+1}</div><div class="date-label">${item.s} / ${item.e}</div><div class="topic-label">${item.t}</div></div>`;
        track.appendChild(slide);
    });
    currentSlide = activeIdx; updateSlider();
}
function updateSlider() { track.style.transform = `translateX(-${currentSlide * 100}%)`; document.getElementById('weekCounter').textContent = `${currentSlide + 1} / ${plan.length}`; }

// KAYDIRMA (SWIPE)
let startX = 0;
sliderContainer.addEventListener('touchstart', e => startX = e.touches[0].clientX);
sliderContainer.addEventListener('touchend', e => {
    let diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < plan.length - 1) currentSlide++;
        else if (diff < 0 && currentSlide > 0) currentSlide--;
        updateSlider();
    }
});

// CANLI GÜNCELLEME
function toMin(s){let p=s.split(':');return +p[0]*60 + +p[1]}
function update(){
    let d=new Date(), day=d.getDay(), min=d.getHours()*60+d.getMinutes();
    now.textContent=d.toLocaleString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    if(day===0||day===6){ lesson.textContent='Tatil'; next.textContent='-'; dailySchedule.innerHTML = 'Hafta sonu ders yok.'; return; }
    let arr=data[day] || [], html = '';
    arr.forEach((item) => {
        let s = toMin(item[0]), e = toMin(item[1]), isActive = (min >= s && min < e), isPast = (min >= e);
        html += `<div class="daily-item ${isActive ? 'active-lesson' : ''}" style="opacity: ${isPast ? '0.5' : '1'}">
            <span>${item[0]} - ${item[1]}</span><span><b>${item[2]}</b></span><span>${isActive ? '● ŞU AN' : (isPast ? 'Bitti' : 'Bekliyor')}</span>
        </div>`;
    });
    dailySchedule.innerHTML = html;
    if(arr.length > 0){
        if (min < toMin(arr[0][0])) { lesson.textContent = 'Ders Başlamadı'; next.textContent = arr[0][0]; }
        else {
            let found = false;
            for(let i=0; i<arr.length; i++){
                let s=toMin(arr[i][0]), e=toMin(arr[i][1]);
                if(min >= s && min < e){ lesson.textContent = arr[i][2]; next.textContent = (e-min) + ' dk'; found=true; break; }
            }
            if(!found) { lesson.textContent = 'Teneffüs'; next.textContent = 'Sıradaki Bekleniyor'; }
        }
    }
}

// SINIF SORGULAMA
function queryByClass() {
    let input = classInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "").trim();
    if(!input) return;
    let found = [];
    for(let g in data) { data[g].forEach(d => { if(d[2].replace("/","") === input) found.push({g: gunler[g], s: d[0]+"-"+d[1]}); }); }
    if(found.length > 0) {
        let h = `<b>${input} Haftalık Programı:</b><br>`;
        found.forEach(f => { h += `• ${f.g} | ${f.s}<br>`; });
        classResult.innerHTML = h;
    } else { classResult.innerHTML = "Kayıt bulunamadı."; }
}

buildSlider(); setInterval(update, 1000); update();
</script>
</body>
</html>
