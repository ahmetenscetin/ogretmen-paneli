<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikret Aras Bulut | Ders Takip Paneli</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:#fff;padding:20px;min-height:100vh}.wrap{max-width:980px;margin:auto}.hero{padding:24px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.card{background:rgba(255,255,255,.08);padding:18px;border-radius:22px;backdrop-filter:blur(8px)}h1{margin:0 0 8px;font-size:32px}.muted{color:#d1d5db}.big{font-size:28px;font-weight:700}input,button{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px}input{background:#e5e7eb}button{background:#22d3ee;font-weight:700;cursor:pointer}.tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#334155;margin-top:8px}@media(max-width:600px){h1{font-size:24px}.big{font-size:22px}}
</style>
</head>
<body>
<div class='wrap'>
<div class='hero'>
<h1>Fikret Aras Bulut | Ders Takip Paneli</h1>
<div class='muted'>Fizik Öğretmeni Haftalık Program Sistemi</div>
<div class='tag'>Canlı Takip • Akıllı Saat Algılama • Mobil Uyumlu</div>
</div>
<div class='grid'>
<div class='card'><div class='muted'>Tarih / Saat</div><div id='now' class='big'></div></div>
<div class='card'><div class='muted'>Şu An</div><div id='lesson' class='big'>Yükleniyor...</div></div>
<div class='card'><div class='muted'>Sonraki Ders</div><div id='next' class='big'>-</div></div>
<div class='card'><div class='muted'>Bugünkü Durum</div><div id='count' class='big'>-</div></div>
</div>
<div class='card' style='margin-top:18px'>
<h2 style='margin-top:0'>Tarih ve Saat Sorgulama</h2>
<input type='date' id='date'>
<input type='text' id='time' placeholder='Örn: 11 / 11:00 / 8.5 / 08.00'>
<button onclick='queryLesson()'>Dersi Sorgula</button>
<div id='result' style='margin-top:14px;font-size:20px'></div>
</div>
</div>
<script>
const data={1:[['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/D'],['15:30','16:10','11/D']],2:[['10:30','11:10','11/C'],['11:20','12:00','11/C'],['13:00','13:40','11/C'],['13:50','14:30','11/C'],['14:40','15:20','11/B'],['15:30','16:10','11/B']],3:[['11:20','12:00','11/A'],['13:00','13:40','11/A'],['13:50','14:30','11/A'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],4:[['08:50','09:30','11/C'],['09:40','10:20','11/C'],['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],5:[]};
function toMin(s){let p=s.split(':');return +p[0]*60 + +p[1]}
function parseInput(v){v=v.trim().replace(',', '.');if(v.includes(':')){let p=v.split(':');return (+p[0])*60 + (+p[1]||0)}let n=parseFloat(v);if(isNaN(n))return null;let h=Math.floor(n),m=Math.round((n-h)*60);return h*60+m}
function find(day,min){let arr=data[day]||[];for(let i=0;i<arr.length;i++){let a=toMin(arr[i][0]),b=toMin(arr[i][1]);if(min>=a&&min<b)return{cur:arr[i],i};if(min<a)return{next:arr[i],i}}return{}}
function update(){let d=new Date(),day=d.getDay(),min=d.getHours()*60+d.getMinutes();now.textContent=d.toLocaleString('tr-TR');if(day===0||day===6||day===5&&data[5].length===0){lesson.textContent='Bugün ders yok';next.textContent='Dinlenme günü';count.textContent='0 ders';return}let r=find(day,min),arr=data[day];count.textContent=arr.length+' ders';if(r.cur){lesson.textContent=r.cur[2]+' Fizik';let nx=arr[r.i+1];next.textContent=nx?nx[2]+' '+nx[0]:'Bugün bitti'}else{lesson.textContent='Şu an boşluk';next.textContent=r.next?r.next[2]+' '+r.next[0]:'Bugün ders yok'}}
function queryLesson(){let dt=date.value,tm=time.value;if(!dt||!tm){result.textContent='Tarih ve saat giriniz.';return}let day=new Date(dt).getDay();if(day===0||day===6||day===5&&data[5].length===0){result.textContent='Bu günde ders yok.';return}let min=parseInput(tm);if(min==null||min<0||min>=1440){result.textContent='Geçerli saat giriniz.';return}let r=find(day,min);result.textContent=r.cur?'O anda ders: '+r.cur[2]+' Fizik ('+r.cur[0]+'-'+r.cur[1]+')':'Bu saatte ders yok.'}
setInterval(update,1000);update();
</script>
</body>
</html>
