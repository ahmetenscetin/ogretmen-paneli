<style>
.gate-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
}
.gate-card {
    background: linear-gradient(45deg, rgba(34,211,238,0.1), rgba(34,211,238,0.05));
    border: 1px solid rgba(34,211,238,0.3);
    padding: 15px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
}
.gate-card:active {
    transform: scale(0.95);
    background: rgba(34,211,238,0.2);
}
.gate-icon {
    font-size: 24px;
    margin-bottom: 8px;
}
.gate-title {
    font-size: 14px;
    font-weight: bold;
}
</style>

<div class="gate-container">
    <div class="gate-card" onclick="openApp('eokul')">
        <div class="gate-icon">🏫</div>
        <div class="gate-title">e-Okul Giriş</div>
    </div>
    <div class="gate-card" onclick="openApp('mebbis')">
        <div class="gate-icon">🔐</div>
        <div class="gate-title">MEBBİS Giriş</div>
    </div>
</div>

<script>
function openApp(appName) {
    let appUri = "";
    let storeUrl = "";

    if (appName === 'eokul') {
        appUri = "intent://#Intent;scheme=com.meb.eokulkurum;package=com.meb.eokulkurum;end";
        storeUrl = "https://play.google.com/store/apps/details?id=com.meb.eokulkurum";
    } else if (appName === 'mebbis') {
        appUri = "intent://#Intent;scheme=tr.gov.meb.mebbis;package=tr.gov.meb.mebbis;end";
        storeUrl = "https://play.google.com/store/apps/details?id=tr.gov.meb.mebbis";
    }

    // Uygulamayı açmayı dene
    const start = Date.now();
    window.location.href = appUri;

    // Eğer 2 saniye içinde uygulama açılmazsa (sayfa değişmezse) Store'a yönlendir
    setTimeout(() => {
        if (Date.now() - start < 2500) {
            window.location.href = storeUrl;
        }
    }, 2000);
}
</script>
