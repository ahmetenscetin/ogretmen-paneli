<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikret Aras Bulut | Profesyonel Ders Paneli</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:#fff;padding:20px;min-height:100vh}.wrap{max-width:980px;margin:auto}.hero{padding:24px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.card{background:rgba(255,255,255,.08);padding:18px;border-radius:22px;backdrop-filter:blur(8px)}h1{margin:0 0 8px;font-size:32px}.muted{color:#d1d5db}.big{font-size:28px;font-weight:700}input,button{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px}input{background:#e5e7eb;color:#000}button{background:#22d3ee;font-weight:700;cursor:pointer;color:#0f172a}.tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#334155;margin-top:8px}.daily-list{margin-top:10px;padding:0;list-style:none}.daily-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);font-size:14px}.active-lesson{background:rgba(34,211,238,0.2);border-radius:10px;color:#22d3ee;font-weight:bold}.search-res{background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;margin-top:5px;font-size:14px;border-left:4px solid #22d3ee}.q-res-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;font-size:15px}@media(max-width:600px){h1{font-size:24px}.big{font-size:22px}}
</style>
</head>
<body>
<div class='wrap'>
    <div class='hero'>
        <h1>Fikret Aras Bulut | Ders Takip Paneli</h1>
        <div class='muted'>Fizik Öğretmeni Profesyonel Asistanı</div>
        <div class='tag'>V5.0 • Günlük Plan Sorgulama • Akıllı Takip</div>
    </div>
    
    <div class='grid'>
        <div class='card'><div class='muted'>Tarih / Saat</div><div id='now' class='big'></div></div>
        <div class='card'><div class='muted'>Şu An</div><div id='lesson' class='big'>Yükleniyor...</div></div>
        <div class='card'><div class='muted'>Durum</div><div id='next' class='big'>-</div></div>
    </div>

    <div class='card' style='margin-top:18px'>
        <h2 style='margin-top:0; font-size:20px; color:#22d3ee'>📅 Bugünün Program Akışı</h2>
        <div id='dailySchedule' class='daily-list'></div>
    </div>

    <div class='card' style='margin-top:18px; border: 1px solid rgba(34,211,238,0.3)'>
        <h2 style='margin-top:0; font-size:20px'>🔍 Sınıf Ders Programı Bul</h2>
        <input type='text' id='classInput' placeholder='Örn: 11D, 11/B, 11-A...'>
        <button onclick='queryByClass()'>Hangi Gün Dersim Var?</button>
        <div id='classResult' style='margin-top:14px;'></div>
    </div>

    <div class='card' style='margin-top:18px; background: rgba(34,211,238,0.1)'>
        <h2 style='margin-top:0; font-size:20px'>🕒 Tarihe Göre Program Sorgula</h2>
        <input type='date' id='dateQuery'>
        <button onclick='queryDayProgram()'>O Günün Programını Göster</button>
        <div id='dayResult' style='margin-top:14px;'></div>
    </div>
</div>

<script>
const data={1:[['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/D'],['15:30','16:10','11/D']],2:[['10:30','11:10','11/C'],['11:20','12:00','11/C'],['13:00','13:40','11/C'],['13:50','14:30','11/C'],['14:40','15:20','11/B'],['15:30','16:10','11/B']],3:[['11:20','12:00','11/A'],['13:00','13:40','11/A'],['13:50','14:30','11/A'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],4:[['08:50','09:30','11/C'],['09:40','10:20','11/C'],['10:30','11:10','11/D'],['11:20','12:00','11/D'],['13:00','13:40','11/B'],['13:50','14:30','11/B'],['14:40','15:20','11/A'],['15:30','16:10','11/A']],5:[]};
const gunler = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];

function toMin(s){let p=s.split(':');return +p[0]*60 + +p[1]}
function cleanClassName(name) { return name.toUpperCase().replace(/[^A-Z0-9]/g, "").trim(); }

// Yeni Sorgulama Fonksiyonu: Tarihe göre tüm günü getirir
function queryDayProgram() {
    let selectedDate = dateQuery.value;
    if(!selectedDate) { dayResult.innerHTML = "Lütfen bir tarih seçin."; return; }
    
    let dateObj = new Date(selectedDate);
    let dayIndex = dateObj.getDay();
    let dayName = gunler[dayIndex];
    let arr = data[dayIndex] || [];

    let html = `<div style="border-bottom: 2px solid #22d3ee; padding-bottom: 5px; margin-bottom: 10px;">
                    <b>${selectedDate} - ${dayName} Programı</b>
                </div>`;

    if(dayIndex === 0 || dayIndex === 6 || (dayIndex === 5 && arr.length === 0)) {
        html += "Bu tarihte planlanmış bir dersiniz bulunmuyor.";
    } else if (arr.length === 0) {
        html += "Bu gün için ders kaydı girilmemiş.";
    } else {
        arr.forEach(ders => {
            html += `<div class="q-res-item">
                        <span>${ders[0]} - ${ders[1]}</span>
                        <span style="color:#22d3ee">${ders[2]} Fizik</span>
                    </div>`;
        });
    }
    dayResult.innerHTML = html;
}

function queryByClass() {
    let input = cleanClassName(classInput.value);
    if(!input) { classResult.innerHTML = "Lütfen bir sınıf girin."; return; }
    let found = [];
    for(let gun in data) {
        data[gun].forEach(ders => {
            if(cleanClassName(ders[2]) === input) {
                found.push({gun: gunler[gun], saat: ders[0] + "-" + ders[1]});
            }
        });
    }
    if(found.length > 0) {
        let html = `<b>${classInput.value.toUpperCase()} Programı:</b><br>`;
        found.forEach(f => { html += `<div class="search-res">${f.gun} | ${f.saat}</div>`; });
        classResult.innerHTML = html;
    } else { classResult.innerHTML = "Ders bulunamadı."; }
}

function update(){
    let d=new Date(), day=d.getDay(), min=d.getHours()*60+d.getMinutes();
    now.textContent=d.toLocaleString('tr-TR');
    if(day===0||day===6||(day===5 && data[5].length===0)){
        lesson.textContent='Tatil'; next.textContent='Dinlenme Günü';
        dailySchedule.innerHTML = 'Bugün ders yok.'; return;
    }
    let arr=data[day], cur=null, nxt=null;
    let html = '';
    arr.forEach((item) => {
        let s = toMin(item[0]), e = toMin(item[1]);
        let isActive = (min >= s && min < e), isPast = (min >= e);
        html += `<div class="daily-item ${isActive ? 'active-lesson' : ''}" style="opacity: ${isPast ? '0.5' : '1'}">
            <span><b>${item[0]}-${item[1]}</b></span>
            <span>${item[2]} Fizik</span>
            <span>${isActive ? '● ŞU AN' : (isPast ? 'Bitti' : 'Bekliyor')}</span>
        </div>`;
    });
    dailySchedule.innerHTML = html;
    if (min < toMin(arr[0][0])) {
        lesson.textContent = 'Henüz Başlamadı'; next.textContent = 'İlk Ders: ' + arr[0][0];
    } else {
        for(let i=0; i<arr.length; i++){
            let start=toMin(arr[i][0]), end=toMin(arr[i][1]);
            if(min >= start && min < end){
                cur = {name: arr[i][2], rem: end - min, type: 'ders'};
                nxt = arr[i+1]; break;
            } else if(i < arr.length - 1){
                let nextStart = toMin(arr[i+1][0]);
                if(min >= end && min < nextStart){
                    cur = {rem: nextStart - min, type: 'break'};
                    nxt = arr[i+1]; break;
                }
            }
        }
        if(cur){
            if(cur.type === 'ders'){
                lesson.textContent = cur.name + ' Fizik'; next.textContent = 'Bitişe: ' + cur.rem + ' dk';
            } else {
                lesson.textContent = cur.rem > 30 ? 'Öğle Arası 🍴' : 'Teneffüs ☕';
                next.textContent = nxt[2] + ' (' + cur.rem + ' dk)';
            }
        } else { lesson.textContent = 'Dersler Bitti'; next.textContent = 'İyi akşamlar!'; }
    }
}
setInterval(update, 1000); update();
</script>
</body>
</html>
